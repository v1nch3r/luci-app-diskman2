name: Build luci-app-diskman2 APK

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Download OpenWrt SDK 25.12.2
        run: |
          wget -q https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar -xf openwrt-sdk-*.tar.zst
          ls -la openwrt-sdk-*/

      - name: Setup feeds & dependencies
        run: |
          cd openwrt-sdk-*/ || exit 1
          ./scripts/feeds update -a
          ./scripts/feeds install luci-compat parted blkid smartmontools e2fsprogs kmod-md-linear kmod-md-raid456 ntfs-3g-utils btrfs-progs lsblk mdadm

      - name: Copy package to SDK
        run: |
          cp -r applications/luci-app-diskman2 openwrt-sdk-*/package/

      - name: Build package (non-interactive)
        run: |
          cd openwrt-sdk-*/ || exit 1
          make defconfig
          make package/luci-app-diskman2/compile V=sc
          make package/index

      - name: Find APK output
        id: find_apk
        run: |
          find bin/packages -name "*.apk" -type f -exec ls -la {} \;

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
